<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | LegallySafe AI</title>

<style>
:root{
    --dark:#0f0c29;
    --mid:#1a1446;
    --white:#ffffff;
    --glass:rgba(255,255,255,0.08);
    --error:#ff4d6d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,var(--dark),var(--mid));
    overflow:hidden;
}

/* SPLIT LAYOUT */
.main-container{
    display:flex;
    height:100vh;
}

/* LEFT IMAGE SIDE */
.image-side{
    flex:1;
    background:
    linear-gradient(rgba(15,12,41,0.7),rgba(26,20,70,0.8)),
    url("static/images/11.jpg");  /* You can change image */
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 10%;
    color:white;
}

.image-side h1{
    font-size:3rem;
    font-weight:800;
    line-height:1.1;
}

.image-side p{
    margin-top:20px;
    font-size:1.1rem;
    opacity:0.9;
}

/* RIGHT FORM SIDE */
.form-side{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* GLASS CARD */
.card{
    width:100%;
    max-width:420px;
    padding:45px;
    border-radius:20px;
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    color:white;
}

.card h2{
    text-align:center;
    margin-bottom:25px;
    font-size:2rem;
}

/* FORM */
input{
    width:100%;
    padding:14px 16px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:0.95rem;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

input:focus{
    outline:none;
    border-color:#a855f7;
    background:rgba(255,255,255,0.15);
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#6366f1,#a855f7);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(124,58,237,0.4);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(124,58,237,0.6);
}

.error{
    color:var(--error);
    font-size:0.85rem;
    margin-top:10px;
    text-align:center;
}

@media(max-width:900px){
    .image-side{display:none;}
}
</style>
</head>

<body>

<div class="main-container">

<!-- LEFT IMAGE SECTION -->
<section class="image-side">
<h1>Secure <br>Password Reset</h1>
<p>Your security is our priority. Create a strong new password to continue.</p>
</section>

<!-- RIGHT FORM SECTION -->
<section class="form-side">

<div class="card">
<h2>Reset Password</h2>

<form method="POST" onsubmit="return validatePassword()">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" id="new_password" name="new_password" placeholder="New Password" required>

<input type="password" id="confirm_password" placeholder="Re-enter Password" required>

<div id="error-msg" class="error"></div>

<button type="submit">
Reset Password
</button>

</form>

</div>
</section>

</div>

<script>
function validatePassword(){
const pass1=document.getElementById("new_password").value;
const pass2=document.getElementById("confirm_password").value;

if(pass1!==pass2){
document.getElementById("error-msg").innerText="Passwords do not match!";
return false;
}
return true;
}
</script>

</body>
</html>
